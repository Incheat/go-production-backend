services:
  # =========================
  # OBSERVABILITY
  # =========================

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  prometheus:
    image: prom/prometheus:latest
    networks:
      - obsnet
    # ports:
    #   - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
    volumes:
      - ./infra/obs/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro

  loki:
    image: grafana/loki:latest
    networks:
      - obsnet
    # ports:
    #   - "3100:3100"
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./infra/obs/loki/loki.yaml:/etc/loki/config.yaml:ro

  promtail:
    image: grafana/promtail:latest
    networks:
      - obsnet
    command:
      - -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/obs/promtail/promtail.yaml:/etc/promtail/config.yaml:ro
      - promtail-positions:/tmp

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    networks:
      - obsnet
    command:
      - --config
      - /etc/otel-collector-config.yaml
    volumes:
      - ./infra/obs/otel/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # ports:
    #   - "4317:4317" # OTLP gRPC
    #   - "4318:4318" # OTLP HTTP
    #   - "9411:9411" # Zipkin

  tempo:
    image: grafana/tempo:latest
    networks:
      - obsnet
    # ports:
    # - "3200:3200" # tempo query
    # - "4317"     # otlp grpc (optional)
    # - "4318"     # otlp http (optional)
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./infra/obs/tempo/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:latest
    networks:
      - obsnet
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/obs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # =========================
  # PROBES
  # =========================

  startup-probe:
    image: probe:dev
    networks:
      - obsnet
    command:
      - sh
      - -c
      - sleep infinity
    depends_on:
      auth-envoy:
        condition: service_started
      user-envoy:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://auth-envoy:19000/ready | grep -q LIVE &&
          curl -fsS http://user-envoy:19000/ready | grep -q LIVE
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  e2e-probe:
    image: probe:dev
    networks:
      - obsnet
    command:
      - sh
      - -c
      - sleep infinity
    depends_on:
      startup-probe:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://auth-envoy:18081/healthz >/dev/null &&
          grpc_health_probe -addr=user-envoy:19081 >/dev/null
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # =========================
  # EDGE
  # =========================

  ingress-envoy:
    image: envoyproxy/envoy:v1.36.4
    labels:
      - obs.logs=true
    networks:
      - edgenet
      - obsnet
    ports:
      - "8081:18080"
      - "127.0.0.1:19000:19000"
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
    volumes:
      - ./infra/envoy/ingress-envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./infra/security/tls/localhost:/etc/envoy/certs:ro

  # =========================
  # AUTH: app + envoy + redis(dev)
  # =========================

  auth-envoy:
    image: envoyproxy/envoy:v1.36.4
    labels:
      - obs.logs=true
    networks:
      - authnet
      - obsnet
    ports:
      - "127.0.0.1:6061:6060" # pprof
      - "127.0.0.1:19001:19000" # http://localhost:19001/stats/prometheus
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
    volumes:
      - ./infra/envoy/auth-envoy.yaml:/etc/envoy/envoy.yaml:ro

  auth:
    image: auth:dev
    labels:
      - obs.logs=true
    env_file:
      - .env.local
    network_mode: service:auth-envoy
    depends_on:
      startup-probe:
        condition: service_healthy
      auth-redis:
        condition: service_started
    # The app listens ONLY on:
    #   127.0.0.1:8080 (HTTP)
    #   127.0.0.1:9090 (gRPC)

  auth-redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${AUTH_REDIS_PASSWORD:-test123}
    networks:
      - authnet
    # ports:
    #   - "6379:6379" # only when needed to access from physical machine

  # =========================
  # USER: app + envoy + mysql(dev)
  # =========================

  user-envoy:
    image: envoyproxy/envoy:v1.36.4
    labels:
      - obs.logs=true
    networks:
      - usernet
      - obsnet
    ports:
      - "127.0.0.1:6062:6060" # pprof
      - "127.0.0.1:19002:19000" # http://localhost:19002/stats/prometheus
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
    volumes:
      - ./infra/envoy/user-envoy.yaml:/etc/envoy/envoy.yaml:ro

  user:
    image: user:dev
    labels:
      - obs.logs=true
    env_file:
      - .env.local
    network_mode: service:user-envoy
    depends_on:
      startup-probe:
        condition: service_healthy
      user-mysql:
        condition: service_healthy
    # The app listens ONLY on:
    #   127.0.0.1:8080 (HTTP)
    #   127.0.0.1:9090 (gRPC)

  user-mysql:
    image: mysql:8.0
    networks:
      - usernet
    environment:
      # if the system doesn't provide the variable, use the default password for development
      MYSQL_DATABASE: ${USER_MYSQL_DB_NAME:-gotest}
      MYSQL_USER: ${USER_MYSQL_USER:-gotester}
      MYSQL_PASSWORD: ${USER_MYSQL_PASSWORD:-test123}
      MYSQL_ROOT_PASSWORD: ${USER_MYSQL_ROOT_PASSWORD:-root}
    # ports:
    #   - "3306:3306" # only when needed to access from physical machine
    volumes:
      - mysql-data:/var/lib/mysql
      # directly mount the migration files
      - ./services/user/db/mysql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${USER_MYSQL_USER}", "-p${USER_MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 2s
      retries: 10

networks:
  authnet: {}
  usernet: {}
  edgenet: {}
  obsnet: {}

volumes:
  promtail-positions: {}
  mysql-data: {}
